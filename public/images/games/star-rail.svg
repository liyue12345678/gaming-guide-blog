<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a081a"/>
      <stop offset="50%" style="stop-color:#1a1540"/>
      <stop offset="100%" style="stop-color:#05030d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Train/star icon -->
  <g transform="translate(300,280)" opacity="0.7">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <!-- Star shapes -->
    <polygon points="0,-70 8,-30 50,-30 15,-10 30,40 0,15 -30,40 -15,-10 -50,-30 -8,-30" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="300" y="490" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#8b5cf6" letter-spacing="3">HONKAI</text>
  <text x="300" y="535" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#8b5cf6" letter-spacing="3">STAR RAIL</text>
  <line x1="200" y1="560" x2="400" y2="560" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <text x="300" y="605" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#7b4ce6" letter-spacing="6">TURN-BASED RPG</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#6a3dd6">PC · Mobile · PlayStation</text>
  <rect x="250" y="710" width="100" height="3" rx="2" fill="#8b5cf6" opacity="0.4"/>
</svg>
