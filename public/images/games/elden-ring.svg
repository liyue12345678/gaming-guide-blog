<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1408"/>
      <stop offset="50%" style="stop-color:#3d2e0a"/>
      <stop offset="100%" style="stop-color:#0d0b04"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#c7a04b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c7a04b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Elden Ring icon - circular rune -->
  <circle cx="300" cy="280" r="120" fill="none" stroke="#c7a04b" stroke-width="3" opacity="0.6"/>
  <circle cx="300" cy="280" r="100" fill="none" stroke="#c7a04b" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="280" r="80" fill="none" stroke="#c7a04b" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="160" x2="300" y2="400" stroke="#c7a04b" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="280" x2="420" y2="280" stroke="#c7a04b" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="195" x2="385" y2="365" stroke="#c7a04b" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="195" x2="215" y2="365" stroke="#c7a04b" stroke-width="1" opacity="0.3"/>
  <!-- Title -->
  <text x="300" y="520" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#c7a04b" letter-spacing="4">ELDEN RING</text>
  <!-- Accent line -->
  <line x1="200" y1="545" x2="400" y2="545" stroke="#c7a04b" stroke-width="2" opacity="0.6"/>
  <!-- Genre -->
  <text x="300" y="590" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#8a7040" letter-spacing="6">ACTION RPG</text>
  <!-- Platforms -->
  <text x="300" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#5a4a30">PC · PlayStation · Xbox</text>
  <!-- Bottom accent -->
  <rect x="250" y="700" width="100" height="3" rx="2" fill="#c7a04b" opacity="0.4"/>
</svg>
