<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0808"/>
      <stop offset="50%" style="stop-color:#3d1515"/>
      <stop offset="100%" style="stop-color:#0a0303"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#c41e3a;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c41e3a;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- D20 die icon -->
  <g transform="translate(300,280)" opacity="0.7">
