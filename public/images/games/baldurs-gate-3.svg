    <polygon points="0,-85 -80,55 0,20" fill="none" stroke="#c41e3a" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="-20" r="8" fill="#c41e3a" opacity="0.4"/>
  </g>
  <text x="300" y="490" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="bold" fill="#c41e3a" letter-spacing="3">BALDUR'S</text>
  <text x="300" y="535" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="bold" fill="#c41e3a" letter-spacing="3">GATE III</text>
  <line x1="200" y1="560" x2="400" y2="560" stroke="#c41e3a" stroke-width="2" opacity="0.6"/>
  <text x="300" y="605" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#aa1a30" letter-spacing="6">CRPG</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#8a1525">PC · PlayStation · Xbox</text>
  <rect x="250" y="710" width="100" height="3" rx="2" fill="#c41e3a" opacity="0.4"/>
