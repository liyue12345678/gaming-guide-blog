<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081a0d"/>
      <stop offset="50%" style="stop-color:#0d3018"/>
      <stop offset="100%" style="stop-color:#040a06"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Delta/triangle icon -->
  <g transform="translate(300,280)" opacity="0.7">
    <polygon points="0,-100 90,60 -90,60" fill="none" stroke="#4ade80" stroke-width="2.5"/>
    <polygon points="0,-60 50,30 -50,30" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#4ade80"/>
  </g>
  <text x="300" y="510" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="48" font-weight="900" fill="#4ade80" letter-spacing="6">DELTA</text>
  <text x="300" y="555" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="48" font-weight="900" fill="#4ade80" letter-spacing="6">FORCE</text>
  <line x1="200" y1="580" x2="400" y2="580" stroke="#4ade80" stroke-width="2" opacity="0.6"/>
  <text x="300" y="625" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#3ab86a" letter-spacing="6">TACTICAL FPS</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#2a9850">PC · PlayStation · Xbox · Mobile</text>
  <rect x="250" y="710" width="100" height="3" rx="2" fill="#4ade80" opacity="0.4"/>
</svg>
