<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a3050"/>
      <stop offset="100%" style="stop-color:#060d18"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#6bb5ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6bb5ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Star/moon icon -->
  <g transform="translate(300,260)" opacity="0.7">
    <polygon points="0,-100 22,-30 100,-30 35,10 60,85 0,35 -60,85 -35,10 -100,-30 -22,-30" fill="none" stroke="#6bb5ff" stroke-width="2"/>
    <circle cx="0" cy="-50" r="15" fill="#6bb5ff" opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#6bb5ff" stroke-width="1.5" opacity="0.4"/>
  </g>
  <text x="300" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="44" font-weight="bold" fill="#6bb5ff" letter-spacing="3">GENSHIN</text>
  <text x="300" y="545" text-anchor="middle" font-family="Georgia,serif" font-size="44" font-weight="bold" fill="#6bb5ff" letter-spacing="3">IMPACT</text>
  <line x1="200" y1="570" x2="400" y2="570" stroke="#6bb5ff" stroke-width="2" opacity="0.6"/>
  <text x="300" y="615" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#4a8abf" letter-spacing="6">ACTION RPG / GACHA</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#3a6a9f">PC · PlayStation · Mobile</text>
  <rect x="250" y="710" width="100" height="3" rx="2" fill="#6bb5ff" opacity="0.4"/>
