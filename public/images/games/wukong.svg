<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="50%" style="stop-color:#3d2810"/>
      <stop offset="100%" style="stop-color:#0d0804"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e8a850;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e8a850;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Staff/circle icon -->
  <g transform="translate(300,280)" opacity="0.7">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#e8a850" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#e8a850" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="-30" x2="90" y2="-50" stroke="#e8a850" stroke-width="2"/>
    <line x1="-60" y1="30" x2="-90" y2="50" stroke="#e8a850" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#e8a850"/>
  </g>
  <text x="300" y="495" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="bold" fill="#e8a850" letter-spacing="4">BLACK MYTH</text>
  <text x="300" y="540" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="bold" fill="#e8a850" letter-spacing="4">WUKONG</text>
  <line x1="200" y1="565" x2="400" y2="565" stroke="#e8a850" stroke-width="2" opacity="0.6"/>
  <text x="300" y="610" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#c89040" letter-spacing="6">ACTION RPG</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a07830">PC · PlayStation</text>
  <rect x="250" y="710" width="100" height="3" rx="2" fill="#e8a850" opacity="0.4"/>
</svg>
