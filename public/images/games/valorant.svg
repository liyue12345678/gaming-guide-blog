<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0810"/>
      <stop offset="50%" style="stop-color:#331520"/>
      <stop offset="100%" style="stop-color:#0a0408"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ff4655;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff4655;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Crosshair icon -->
  <g transform="translate(300,280)" opacity="0.8">
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#ff4655" stroke-width="2"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#ff4655" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff4655" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#ff4655"/>
    <line x1="-80" y1="-80" x2="-30" y2="-30" stroke="#ff4655" stroke-width="1.5" opacity="0.5"/>
    <line x1="80" y1="-80" x2="30" y2="-30" stroke="#ff4655" stroke-width="1.5" opacity="0.5"/>
    <line x1="-80" y1="80" x2="-30" y2="30" stroke="#ff4655" stroke-width="1.5" opacity="0.5"/>
    <line x1="80" y1="80" x2="30" y2="30" stroke="#ff4655" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="300" y="510" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="48" font-weight="900" fill="#ff4655" letter-spacing="6">VALORANT</text>
  <line x1="200" y1="535" x2="400" y2="535" stroke="#ff4655" stroke-width="2" opacity="0.6"/>
  <text x="300" y="580" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#cc3845" letter-spacing="6">TACTICAL FPS</text>
  <text x="300" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#aa2d38">PC</text>
  <rect x="250" y="710" width="100" height="3" rx="2" fill="#ff4655" opacity="0.4"/>
</svg>
